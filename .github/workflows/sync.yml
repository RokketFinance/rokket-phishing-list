name: sync phishing list

# Mantiene dist/config.json sincronizado con MetaMask/eth-phishing-detect + overlay propio.
# Diario a las 06:00 UTC (y manual). Así el fork no se queda viejo como otros forks abandonados.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'overlay.json'
      - 'scripts/merge.mjs'

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generar dist/config.json
        run: node scripts/merge.mjs
      - name: Commit si cambió
        run: |
          if [ -n "$(git status --porcelain dist/config.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dist/config.json
            git commit -m "chore: sync phishing list ($(date -u +%F))"
            git push
          else
            echo "Sin cambios."
          fi
